version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ecommerce-backend
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ConnectionStrings__UserAppCon=${DB_CONNECTION_STRING}
      - Jwt__Secret=${JWT_SECRET}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy  # ✅ Đợi DB healthy mới start
    restart: always
    networks:
      - ecommerce
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    # ✅ Thêm volumes để mount code (cho development)
    volumes:
      - ./backend:/app  # Nếu muốn hot-reload

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:  # ✅ Thêm args để build với API URL
        - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:5000}
    container_name: ecommerce-frontend
    environment:
      - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:5000}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always
    networks:
      - ecommerce

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ecommerce-db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${DB_SA_PASSWORD}
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: always
    networks:
      - ecommerce
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "${DB_SA_PASSWORD}" -Q "SELECT 1"
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: ecommerce-nginx
    ports:
      - "80:80"
      # - "443:443"  # ✅ Comment lại vì chưa có SSL
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # - ./ssl:/etc/nginx/ssl:ro  # ✅ Comment lại
    depends_on:
      - backend
      - frontend
    restart: always
    networks:
      - ecommerce

volumes:
  sqlserver_data:
    driver: local

networks:
  ecommerce:
    driver: bridge