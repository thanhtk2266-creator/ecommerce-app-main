services:
  backend:
    image: ghcr.io/thanhtk2266-creator/ecommerce-app-main/backend:latest
    container_name: ecommerce-backend
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ConnectionStrings__UserAppCon=${DB_CONNECTION_STRING}
      - Jwt__Secret=${JWT_SECRET}
    ports:
      - "5000:5000"
    depends_on:
      - db
    restart: always
    networks:
      - ecommerce
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: ghcr.io/thanhtk2266-creator/ecommerce-app-main/frontend:latest
    container_name: ecommerce-frontend
    environment:
      - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:5000}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always
    networks:
      - ecommerce

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ecommerce-db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${DB_SA_PASSWORD}
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: always
    networks:
      - ecommerce

  nginx:
    image: nginx:alpine
    container_name: ecommerce-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: always
    networks:
      - ecommerce

volumes:
  sqlserver_data:
    driver: local

networks:
  ecommerce:
    driver: bridge